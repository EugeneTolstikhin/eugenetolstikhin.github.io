services:
  app:
    build:
      context: .
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3010
      SEED_SIZE: 10000
    ports:
      - "3010:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  node_modules:
