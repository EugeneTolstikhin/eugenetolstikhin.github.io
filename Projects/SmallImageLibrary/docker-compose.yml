services:
  api:
    build:
      context: ./backend
    working_dir: /app
    command: sh -c "npm install && npm run prisma:deploy && npm run prisma:generate && npm run prisma:seed && npm run start:dev"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://image:image@postgres:5432/small_image_library
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3002
      SEED_SIZE: 10000
      SEARCH_CACHE_TTL_SECONDS: 30
      RATE_LIMIT_WINDOW_SECONDS: 60
      RATE_LIMIT_MAX_REQUESTS: 120
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    ports:
      - "3002:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: image
      POSTGRES_PASSWORD: image
      POSTGRES_DB: small_image_library
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U image -d small_image_library"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 15

volumes:
  api_node_modules:
  frontend_node_modules:
  postgres_data:
