services:
  portfolio:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - portfolio_node_modules:/app/node_modules

  portfolio-check:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm test"
    profiles:
      - check
    volumes:
      - .:/app
      - portfolio_check_node_modules:/app/node_modules

volumes:
  portfolio_node_modules:
  portfolio_check_node_modules:
